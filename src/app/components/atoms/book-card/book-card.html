<div class="flex flex-col gap-4 min-w-[200px] w-[200px] snap-start group cursor-pointer">
  <div class="w-full aspect-[2/3] rounded-lg bg-surface-dark overflow-hidden relative shadow-xl shadow-black/60 group-hover:-translate-y-2 transition-transform duration-500 ring-1 ring-white/5">
    <div
      class="absolute inset-0 bg-cover bg-center opacity-90 group-hover:opacity-100 transition-opacity duration-500"
      data-alt="Classic book cover art with elegant typography"
      [style.background-image]="`url(${coverUrl()})`"
    ></div>
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60 group-hover:opacity-40 transition-opacity"></div>
  </div>
  <div class="px-1">
    <p class="text-text-main text-lg font-serif font-semibold leading-tight truncate group-hover:text-primary transition-colors">{{title()}}</p>
    <p class="text-text-muted text-sm font-medium leading-normal truncate italic">{{author()}}</p>
  </div>
</div>
