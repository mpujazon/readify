<main class="flex flex-1 justify-center py-8 px-4 md:px-10">
  <div class="flex flex-col max-w-[1280px] flex-1 w-full">
    <div class="flex flex-col gap-8 pb-10 pt-6">
      <div class="space-y-2">
        <h1 class="text-white tracking-tight text-4xl md:text-5xl font-bold leading-tight">Discover Your <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary/80">Next Read</span>
        </h1>
        <p class="text-slate-400 text-lg max-w-2xl">Explore our curated collection of bestsellers, classics, and
          hidden gems.</p>
      </div>
      <div class="flex flex-col lg:flex-row gap-4">
        <div class="relative flex-1 group">
          <div
            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined">search</span>
          </div>
          <input
            class="w-full bg-surface-dark text-white rounded-xl border border-border-dark focus:border-primary focus:ring-1 focus:ring-primary pl-11 pr-4 py-4 text-base placeholder:text-slate-600 transition-all shadow-sm"
            placeholder="Search by title, author, or ISBN" type="text" />
        </div>
        <div class="flex gap-3 overflow-x-auto pb-2 lg:pb-0 scrollbar-hide">
          <button
            class="flex h-[58px] shrink-0 items-center justify-center gap-x-2 rounded-xl bg-surface-dark border border-border-dark hover:border-slate-600 px-5 transition-colors shadow-sm group">
            <span class="text-slate-300 text-sm font-medium group-hover:text-white transition-colors">Genre</span>
            <span
              class="material-symbols-outlined text-slate-500 group-hover:text-white transition-colors !text-[20px]">expand_more</span>
          </button>
          <button
            class="flex h-[58px] shrink-0 items-center justify-center gap-x-2 rounded-xl bg-surface-dark border border-border-dark hover:border-slate-600 px-5 transition-colors shadow-sm group">
            <span class="text-slate-300 text-sm font-medium group-hover:text-white transition-colors">Author</span>
            <span
              class="material-symbols-outlined text-slate-500 group-hover:text-white transition-colors !text-[20px]">expand_more</span>
          </button>
          <button
            class="flex h-[58px] shrink-0 items-center justify-center gap-x-2 rounded-xl bg-surface-dark border border-border-dark hover:border-slate-600 px-5 transition-colors shadow-sm group">
            <span class="text-slate-300 text-sm font-medium group-hover:text-white transition-colors">Year</span>
            <span
              class="material-symbols-outlined text-slate-500 group-hover:text-white transition-colors !text-[20px]">expand_more</span>
          </button>
          <button aria-label="More filters"
            class="flex h-[58px] w-[58px] shrink-0 items-center justify-center rounded-xl bg-surface-dark border border-border-dark hover:border-slate-600 hover:text-white text-slate-400 transition-all shadow-sm group">
            <span class="material-symbols-outlined group-hover:rotate-90 transition-transform duration-300">tune</span>
          </button>
        </div>
      </div>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
      @for (book of books; track book.id) {
        <app-book-card [book]="book" />
      }
    </div>
    <div class="mt-12 flex justify-center pb-12">
      <button
        class="group flex h-11 items-center justify-center gap-2 rounded-xl border border-border-dark bg-surface-dark px-8 transition-all hover:border-primary hover:bg-surface-darker hover:text-white">
        <span class="text-white text-sm font-bold">Load More Books</span>
        <span
          class="material-symbols-outlined text-slate-400 group-hover:text-white transition-colors !text-[20px]">refresh</span>
      </button>
    </div>
  </div>
</main>
